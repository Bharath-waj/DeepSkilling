<div class="reactive-form-container">
  <h2>Enrollment Request (Reactive Form)</h2>

  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">

    <div class="form-field">
      <label for="studentName">Student Name</label>
      <input id="studentName" formControlName="studentName" />
      <span
        *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['required']"
        class="error">
        Name is required
      </span>
      <span
        *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['minlength']"
        class="error">
        Name must be at least 3 characters
      </span>
    </div>

    <div class="form-field">
      <label for="studentEmail">Student Email</label>
      <input id="studentEmail" formControlName="studentEmail" />
      <span
        *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['required']"
        class="error">
        Email is required
      </span>
      <span
        *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['email']"
        class="error">
        Enter a valid email
      </span>
      <!-- this one only shows up after the 800ms fake delay finishes -->
      <span
        *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']"
        class="error">
        Email already taken
      </span>
    </div>

    <div class="form-field">
      <label for="courseId">Course ID</label>
      <input id="courseId" formControlName="courseId" />
      <span
        *ngIf="enrollForm.get('courseId')?.touched && enrollForm.get('courseId')?.errors?.['required']"
        class="error">
        Course ID is required
      </span>
      <span
        *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']"
        class="error">
        Course code starting with XX is not allowed.
      </span>
    </div>

    <div class="form-field">
      <label for="preferredSemester">Preferred Semester</label>
      <select id="preferredSemester" formControlName="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <div class="form-field checkbox-field">
      <input id="agreeToTerms" type="checkbox" formControlName="agreeToTerms" />
      <label for="agreeToTerms">I agree to the terms</label>
    </div>

    <!-- dynamic list of extra courses, can add/remove as many as you want -->
    <div class="form-field">
      <label>Additional Courses</label>
      <div *ngFor="let ctrl of additionalCourses.controls; let i = index" class="additional-course-row">
        <input [formControl]="$any(ctrl)" placeholder="Course code" />
        <button type="button" (click)="removeCourse(i)">Remove</button>
      </div>
      <button type="button" (click)="addCourse()">Add Another Course</button>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
    </div>

  </form>
</div>
