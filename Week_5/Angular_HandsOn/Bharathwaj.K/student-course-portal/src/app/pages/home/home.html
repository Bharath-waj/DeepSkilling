<div class="home-container">
  <h1>{{ portalName }}</h1>
  <p>
    Browse courses, track your enrollments, and stay on top of your
    grades — all in one place.
  </p>

  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-value">{{ coursesAvailable }}</span>
      <span class="stat-label">Courses Available</span>
    </div>
    <div class="stat-card">
      <span class="stat-value">3</span>
      <span class="stat-label">Enrolled</span>
    </div>
    <div class="stat-card">
      <span class="stat-value">3.8</span>
      <span class="stat-label">GPA</span>
    </div>
  </div>

  <div class="enroll-section">
    <button [disabled]="!isPortalActive" (click)="onEnrollClick()">
      Enroll Now
    </button>
    <p *ngIf="message">{{ message }}</p>
  </div>

  <div class="search-section">
    <label for="search">Search courses:</label>
    <input id="search" [(ngModel)]="searchTerm" placeholder="e.g. Angular" />
    <p>Searching for: {{ searchTerm }}</p>
  </div>
</div>
