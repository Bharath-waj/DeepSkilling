<div class="enroll-form-container">
  <h2>Student Enrollment Request</h2>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">

    <div class="form-field">
      <label for="studentName">Student Name</label>
      <input
        id="studentName"
        name="studentName"
        [(ngModel)]="studentName"
        required
        minlength="3"
        #nameCtrl="ngModel" />

      <!-- only show errors once the user has actually clicked into and out
           of the field, otherwise it yells at them before they even type -->
      <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']" class="error">
        Name is required
      </span>
      <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']" class="error">
        Name must be at least 3 characters
      </span>
    </div>

    <div class="form-field">
      <label for="studentEmail">Student Email</label>
      <input
        id="studentEmail"
        name="studentEmail"
        type="email"
        [(ngModel)]="studentEmail"
        required
        email
        #emailCtrl="ngModel" />

      <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']" class="error">
        Email is required
      </span>
      <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']" class="error">
        Enter a valid email
      </span>
    </div>

    <div class="form-field">
      <label for="courseId">Course ID</label>
      <input
        id="courseId"
        name="courseId"
        type="number"
        [(ngModel)]="courseId"
        required
        #courseCtrl="ngModel" />

      <span *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']" class="error">
        Course ID is required
      </span>
    </div>

    <div class="form-field">
      <label for="preferredSemester">Preferred Semester</label>
      <select id="preferredSemester" name="preferredSemester" [(ngModel)]="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <div class="form-field checkbox-field">
      <input
        id="agreeToTerms"
        name="agreeToTerms"
        type="checkbox"
        [(ngModel)]="agreeToTerms"
        required
        #agreeCtrl="ngModel" />
      <label for="agreeToTerms">I agree to the terms</label>

      <span *ngIf="agreeCtrl.touched && agreeCtrl.errors?.['required']" class="error">
        You must agree before submitting
      </span>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
      <button type="button" (click)="enrollForm.resetForm()">Reset</button>
    </div>

    <div *ngIf="submitted" class="success-msg">
      Enrollment request submitted successfully!
    </div>

  </form>
</div>
